<!doctype html>
<html lang="en" class="dark">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Chayatorn Ounpat</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&family=Noto+Sans+Mono:wght@400;500&display=swap"
            rel="stylesheet"
        />
        <script src="https://cdn.tailwindcss.com"></script>
        <script>
            tailwind.config = {
                darkMode: "class",
                theme: {
                    extend: {
                        fontFamily: {
                            sans: [
                                '"Noto Sans"',
                                "ui-sans-serif",
                                "system-ui",
                                "sans-serif",
                            ],
                            mono: [
                                '"Noto Sans Mono"',
                                "ui-monospace",
                                "monospace",
                            ],
                        },
                        colors: {
                            ink: {
                                950: "#0a0a0b",
                                900: "#101012",
                                800: "#1a1a1d",
                                700: "#26262b",
                                500: "#6b6b73",
                                300: "#c4c4cc",
                                100: "#f2f2f4",
                            },
                            accent: "#d4ff3a",
                        },
                    },
                },
            };
        </script>
        <style type="text/tailwindcss">
            @layer base {
                html,
                body {
                    height: 100%;
                }
                body {
                    background-color: theme("colors.ink.950");
                    color: theme("colors.ink.100");
                    font-family: theme("fontFamily.sans");
                    -webkit-font-smoothing: antialiased;
                }
            }
            @layer utilities {
                .bg-grid {
                    background-image:
                        linear-gradient(
                            to right,
                            rgba(255, 255, 255, 0.04) 1px,
                            transparent 1px
                        ),
                        linear-gradient(
                            to bottom,
                            rgba(255, 255, 255, 0.04) 1px,
                            transparent 1px
                        );
                    background-size: 48px 48px;
                    mask-image: radial-gradient(
                        ellipse at center,
                        black 30%,
                        transparent 75%
                    );
                }
                .blink {
                    animation: blink 1.1s steps(2, start) infinite;
                }
                @keyframes blink {
                    to {
                        visibility: hidden;
                    }
                }
                .pause-dots > span {
                    opacity: 0;
                    animation: dot 2.4s steps(1) infinite;
                }
                .pause-dots > span:nth-child(2) {
                    animation-delay: 0.3s;
                }
                .pause-dots > span:nth-child(3) {
                    animation-delay: 0.6s;
                }
                @keyframes dot {
                    0%,
                    90%,
                    100% {
                        opacity: 0;
                    }
                    10%,
                    80% {
                        opacity: 1;
                    }
                }
                .yet-in {
                    display: inline-block;
                    opacity: 0;
                    transform: translateY(0.15em);
                    animation: yetIn 0.6s ease-out 1.4s forwards;
                }
                @keyframes yetIn {
                    to {
                        opacity: 1;
                        transform: translateY(0);
                    }
                }
            }
        </style>
    </head>
    <body class="h-full overflow-hidden">
        <main class="relative h-full w-full flex flex-col">
            <!-- Background -->
            <div class="absolute inset-0 bg-grid pointer-events-none"></div>
            <div
                class="absolute -top-40 -left-40 h-[28rem] w-[28rem] rounded-full bg-accent/10 blur-3xl pointer-events-none"
            ></div>
            <div
                class="absolute -bottom-32 -right-32 h-[26rem] w-[26rem] rounded-full bg-white/[0.03] blur-3xl pointer-events-none"
            ></div>

            <!-- Top bar -->
            <header
                class="relative z-10 flex items-center justify-between px-6 sm:px-10 pt-6 sm:pt-8 font-mono text-xs text-ink-500"
            >
                <span class="tracking-widest">CHAYATORNOUNPAT.COM</span>
                <span class="flex items-center gap-2">
                    <span
                        class="h-1.5 w-1.5 rounded-full bg-yellow-400 shadow-[0_0_10px_theme(colors.yellow.400)] animate-pulse"
                    ></span>
                    <span
                        class="tracking-widest text-yellow-400/90"
                        style="color: rgb(255, 255, 255)"
                        >UNDER CONSTRUCTION</span

                </span>
            </header>

            <!-- Center -->

                    // WHOAMI
                </p>
                <h1
                    class="text-5xl sm:text-7xl md:text-8xl font-bold tracking-tight leading-[0.95]"
                >
                    Chayatorn<br />

                        >Ounpat<span class="blink text-accent">_</span></span

                </h1>
                <p
                    class="mt-6 max-w-xl text-ink-300 text-base sm:text-lg leading-relaxed"
                >
                    A developer who still hadn&rsquo;t built his own personal
                    site<span
                        class="pause-dots inline-block text-ink-500 mx-1"
                        aria-hidden="true"
                        ><span>.</span><span>.</span><span>.</span></span
                    ><span class="yet-in font-semibold text-accent italic"
                        >yet</span
                    >
                </p>

                <!-- Links -->
                <ul
                    class="mt-10 grid grid-cols-1 sm:grid-cols-2 gap-3 max-w-2xl"
                >
                    <li>
                        <a
                            href="mailto:mail@chayatornounpat.com"
                            class="group flex items-center justify-between rounded-xl border border-ink-800 bg-ink-900/60 backdrop-blur px-5 py-4 hover:border-accent hover:bg-ink-800/80 transition-colors"
                        >
                            <span class="flex flex-col">
                                <span
                                    class="font-mono text-[10px] uppercase tracking-widest text-ink-500"
                                    >Email</span
                                >
                                <span class="text-sm mt-1"
                                    >mail@chayatornounpat.com</span
                                >
                            </span>
                            <span
                                class="font-mono text-ink-500 group-hover:text-accent group-hover:translate-x-1 transition-transform"
                                >↗</span

                    </li>
                    <li>
                        <a

                            target="_blank"
                            rel="noopener"
                            class="group flex items-center justify-between rounded-xl border border-ink-800 bg-ink-900/60 backdrop-blur px-5 py-4 hover:border-accent hover:bg-ink-800/80 transition-colors"
                        >
                            <span class="flex flex-col">
                                <span
                                    class="font-mono text-[10px] uppercase tracking-widest text-ink-500"
                                    >GitHub</span
                                >
                                <span class="text-sm mt-1"
                                    >@ChayatornOunpat</span
                                >
                            </span>
                            <span
                                class="font-mono text-ink-500 group-hover:text-accent group-hover:translate-x-1 transition-transform"
                                >↗</span
                            >
                        </a>
                    </li>
                    <li>
                        <a
                            href="https://www.linkedin.com/in/chayatorn-ounpat-0a01612b6/"
                            target="_blank"
                            rel="noopener"
                            class="group flex items-center justify-between rounded-xl border border-ink-800 bg-ink-900/60 backdrop-blur px-5 py-4 hover:border-accent hover:bg-ink-800/80 transition-colors"
                        >
                            <span class="flex flex-col">
                                <span
                                    class="font-mono text-[10px] uppercase tracking-widest text-ink-500"
                                    >LinkedIn</span
                                >
                                <span class="text-sm mt-1"
                                    >chayatorn-ounpat</span

                            </span>

                            >

                    <li class="hidden sm:block">
                        <div
                            class="flex items-center justify-between rounded-xl border border-dashed border-ink-800 bg-ink-900/30 px-5 py-4"
                        >
                            <span class="flex flex-col">
                                <span
                                    class="font-mono text-[10px] uppercase tracking-widest text-ink-500"
                                    >Note</span
                                >
                                <span class="text-sm mt-1 text-ink-300"
                                    >grid is beautiful</span
                                >
                            </span>
                            <span class="font-mono text-ink-500">◇</span>
                        </div>
                    </li>
                </ul>
            </section>

            <!-- Footer -->
            <footer
                class="relative z-10 flex items-center justify-between px-6 sm:px-10 pb-6 sm:pb-8 font-mono text-xs text-ink-500"
            >
                <span>© 2026</span>
                <span class="tracking-widest">v0.1 — PLACEHOLDER</span>
            </footer>
        </main>
    </body>
</html>
